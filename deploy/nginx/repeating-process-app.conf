server {
    listen 80;
    listen [::]:80;
    server_name <app-domain>;

    client_max_body_size 10m;

    root /srv/repeating-process-app/current/frontend/dist;
    index index.html;

    access_log /var/log/nginx/repeating-process-app.access.log;
    error_log /var/log/nginx/repeating-process-app.error.log;

    location /static/ {
        alias /srv/repeating-process-app/current/backend/staticfiles/;
        access_log off;
        expires 1h;
        add_header Cache-Control "public";
    }

    location /api/ {
        proxy_pass http://unix:/run/repeating-process-app/gunicorn.sock;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_redirect off;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}

# HTTPS guidance:
# - keep this checked-in file certificate-free
# - add a separate 443 server block on the server once university IT provides
#   the real hostname and certificate management method
# - when TLS is enabled, keep backend.env aligned with:
#   FRONTEND_URL=https://<app-domain>
#   CORS_ALLOWED_ORIGINS=https://<app-domain>
#   CSRF_TRUSTED_ORIGINS=https://<app-domain>
#   USE_X_FORWARDED_PROTO=True
